services:
  osm-db:
    image: postgis/postgis:16-3.4
    shm_size: "2g"
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=2GB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - work_mem=32MB
      - -c
      - max_wal_size=32GB
      - -c
      - min_wal_size=8GB
      - -c
      - checkpoint_timeout=60min
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_compression=on
      - -c
      - wal_level=minimal
      - -c
      - max_wal_senders=0
      - -c
      - archive_mode=off
      - -c
      - synchronous_commit=off
      - -c
      - fsync=off
      - -c
      - full_page_writes=off
      - -c
      - autovacuum=off
      - -c
      - effective_io_concurrency=200
      - -c
      - random_page_cost=1.1
    environment:
      POSTGRES_DB: osm
      POSTGRES_USER: osm
      POSTGRES_PASSWORD: osm_dev
    ports:
      - "${OI_DB_PORT:-5434}:5432"
    volumes:
      - oi-osm-db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osm -d osm"]
      interval: 5s
      timeout: 3s
      retries: 20

  rust:
    image: rust:1.88-bookworm
    working_dir: /workspace
    environment:
      PATH: /usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git

volumes:
  oi-osm-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OI_OSM_PGDATA_DIR:-./.data/osm-pgdata}
  cargo-registry:
    driver: local
  cargo-git:
    driver: local
